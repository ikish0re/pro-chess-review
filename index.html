<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Game Review</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <style>
        :root { --bg: #21201d; --panel: #262421; --accent: #81b64c; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; width: 100%; }
        .app-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
        #setup-screen { background: var(--panel); padding: 20px; border-radius: 12px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tab-container { display: flex; width: 100%; margin-bottom: 15px; background: #111; border-radius: 8px; overflow: hidden; padding: 3px; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; color: #888; background: transparent; border: none; transition: 0.2s; }
        .tab.active { background: #333; color: #fff; border-bottom: 2px solid var(--accent); }
        .tab-content { display: none; flex-direction: column; }
        .tab-content.active { display: flex; }
        .search-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        input { flex: 1; background: #333; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 16px; outline: none; }
        .btn-search { background: #555; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-weight: bold; cursor: pointer; height: 46px; }
        .filter-row { display: flex; gap: 5px; margin-bottom: 10px; justify-content: space-between; }
        .filter-row select { flex: 1; background: #333; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 8px; font-size: 12px; appearance: none; text-align: center; }
        .game-list { max-height: 280px; overflow-y: auto; background: #1a1917; border-radius: 8px; border: 1px solid #333; margin-top: 5px; width: 100%; }
        .game-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.1s; gap: 12px; position: relative; width: 100%; }
        .game-card.selected { background: rgba(129,182,76,0.15); border-left: 5px solid var(--accent); }
        .gc-avatar { width: 44px; height: 44px; background: #444; border-radius: 6px; overflow: hidden; flex-shrink: 0; border: 1px solid #555; display: flex; align-items: center; justify-content: center; position: relative; }
        .gc-avatar img { width: 100%; height: 100%; object-fit: cover; z-index: 2; position: relative; }
        .gc-avatar::before { content: "👤"; position: absolute; font-size: 20px; z-index: 1; opacity: 0.3; }
        .gc-details { flex: 1; min-width: 0; }
        .gc-opp { font-size: 14px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 6px; }
        .gc-meta { font-size: 11px; color: #777; margin-top: 3px; }
        .gc-res { font-weight: bold; font-size: 11px; padding: 5px 10px; border-radius: 6px; min-width: 65px; text-align: center; }
        .win  { background: rgba(129,182,76,0.2);  color: #81b64c; border: 1px solid #81b64c; }
        .draw { background: rgba(240,193,92,0.2);  color: #f0c15c; border: 1px solid #f0c15c; }
        .loss { background: rgba(179,52,48,0.2);   color: #b33430; border: 1px solid #b33430; }
        .sel-icon { color: #81b64c; font-size: 16px; display: none; }
        .game-card.selected .sel-icon { display: inline; }
        .depth-select { width: 100%; padding: 14px; margin-top: 15px; background: #333; color: #fff; border: 1px solid #444; border-radius: 10px; font-size: 14px; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 18px; cursor: pointer; }
        .run-btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 18px; margin-top: 15px; box-shadow: 0 4px 0 #5d8b33; }
        #statusMsg { color: #ffaa00; font-size: 13px; margin: 10px 0; text-align: center; font-weight: bold; }
        #prog-wrap { display: none; height: 10px; background: #111; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #prog-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.15s linear; }

        #review-screen { display: none; width: 100%; flex-direction: column; gap: 10px; }
        .accuracy-header { display: flex; width: 100%; background: #302e2b; border-radius: 10px; overflow: hidden; padding: 4px; gap: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .acc-pill { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; border-radius: 6px; }
        .acc-pill.white-p { background: #f1f1f1; color: #000; }
        .acc-pill.black-p { background: #444; color: #fff; }
        .acc-val { font-size: 22px; font-weight: 900; line-height: 1; }
        .acc-label { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 4px; opacity: 0.7; }
        .coach-wrap { display: flex; align-items: center; width: 100%; gap: 8px; }
        .coach-avatar { font-size: 45px; line-height: 1; flex-shrink: 0; }
        .bubble { flex: 1; background: #fff; color: #000; padding: 10px 14px; border-radius: 20px; border-bottom-left-radius: 2px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .board-box { display: flex; gap: 10px; width: 100%; }
        #board-wrapper { flex: 1; position: relative; border-radius: 6px; border: 3px solid #333; overflow: hidden; }
        #badge-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .eval-bar { width: 28px; background: #333; border-radius: 6px; overflow: hidden; position: relative; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid #444; }
        .efill { width: 100%; height: 50%; background: #fff; transition: height 0.3s ease-out; }
        .enum { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: bold; z-index: 10; }
        .ribbon { display: flex; overflow-x: auto; background: #302e2b; padding: 12px; border-radius: 8px; gap: 10px; min-height: 48px; scroll-behavior: smooth; }
        .m-item { color: #888; cursor: pointer; white-space: nowrap; padding: 6px 10px; border-radius: 4px; font-size: 14px; }
        .m-item.active { color: #fff; background: #444; border-bottom: 3px solid var(--accent); }
        .move-badge { position: absolute; width: 22px; height: 22px; border-radius: 50%; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; transform: translate(-50%,-50%); box-shadow: 0 2px 6px rgba(0,0,0,0.6); z-index: 200; }
        .c-brilliant  { background: #15d1ba; color: #000; }
        .c-great      { background: #5c8bb0; }
        .c-best       { background: #95bb4a; }
        .c-good       { background: #96af8b; }
        .c-inaccuracy { background: #f0c15c; color: #000; }
        .c-mistake    { background: #e6912c; }
        .c-blunder    { background: #b33430; }
        [data-square] { position: relative; }
        .selected-square { background-color: rgba(129,182,76,0.5) !important; }
        .legal-dot::after { content: ""; position: absolute; top: 50%; left: 50%; width: 26%; height: 26%; background: rgba(0,0,0,0.2); border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; }
        .legal-cap::after { content: ""; position: absolute; top: 50%; left: 50%; width: 80%; height: 80%; border: 6px solid rgba(0,0,0,0.2); border-radius: 50%; transform: translate(-50%,-50%); box-sizing: border-box; pointer-events: none; }
        .btn-secondary { width: 100%; padding: 12px; background: #444; border: none; color: #ccc; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #555; }

        /* Explanation sheet */
        #expl-sheet { position: fixed; left: 0; right: 0; bottom: -400px; z-index: 998; background: #1c1c1e; border-radius: 20px 20px 0 0; padding: 0 16px 20px; box-shadow: 0 -4px 24px rgba(0,0,0,0.6); transition: bottom 0.32s cubic-bezier(0.4,0,0.2,1); max-height: 55vh; overflow-y: auto; }
        #expl-sheet.open { bottom: var(--nav-h, 85px); }
        .sheet-handle { width: 36px; height: 4px; background: #555; border-radius: 2px; margin: 10px auto 14px; }
        .sheet-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
        .sheet-badge.c-brilliant  { background: rgba(21,209,186,0.15); color: #15d1ba; border: 1px solid rgba(21,209,186,0.3); }
        .sheet-badge.c-great      { background: rgba(92,139,176,0.15); color: #7ab0d8; border: 1px solid rgba(92,139,176,0.3); }
        .sheet-badge.c-inaccuracy { background: rgba(240,193,92,0.15); color: #f0c15c; border: 1px solid rgba(240,193,92,0.3); }
        .sheet-badge.c-mistake    { background: rgba(230,145,44,0.15); color: #e6912c; border: 1px solid rgba(230,145,44,0.3); }
        .sheet-badge.c-blunder    { background: rgba(179,52,48,0.15);  color: #e05550; border: 1px solid rgba(179,52,48,0.3); }
        .sheet-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 8px; line-height: 1.3; }
        .sheet-body  { font-size: 14px; color: #aaa; line-height: 1.6; }
        .sheet-body b { color: #81b64c; }
        .sheet-dismiss { position: absolute; top: 12px; right: 16px; background: #333; border: none; color: #888; font-size: 16px; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Fixed bottom nav */
        #nav-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #21201d; padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); flex-direction: column; gap: 6px; z-index: 999; border-top: 1px solid #333; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="setup-screen">
        <h2 style="margin:0 0 15px 0;text-align:center;color:var(--accent);">♟️ Pro Game Review</h2>
        <div class="tab-container">
            <button class="tab active" id="t-api" onclick="setTab('api')">Chess.com</button>
            <button class="tab" id="t-pgn" onclick="setTab('pgn')">Paste PGN</button>
        </div>
        <div id="p-api" class="tab-content active">
            <div class="search-row">
                <input type="text" id="userInput" placeholder="Username">
                <button onclick="apiFetch()" class="btn-search">Search</button>
            </div>
            <div class="filter-row">
                <select id="fYear"></select>
                <select id="fMonth"></select>
                <select id="fDay"><option value="all">Any Day</option></select>
            </div>
            <div id="statsBar" style="display:none;background:#1e2d14;border:1px solid #3a5c28;border-radius:8px;padding:10px 14px;margin-top:8px;flex-direction:row;justify-content:space-between;align-items:center;gap:8px;">
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#81b64c;" id="statWins">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Wins</div></div>
                <div style="width:1px;background:#3a5c28;align-self:stretch;"></div>
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#b33430;" id="statLosses">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Losses</div></div>
                <div style="width:1px;background:#3a5c28;align-self:stretch;"></div>
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#f0c15c;" id="statDraws">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Draws</div></div>
                <div style="width:1px;background:#3a5c28;align-self:stretch;"></div>
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#fff;" id="statAcc">—</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Avg Acc</div></div>
            </div>
            <div class="game-list" id="glBox" style="display:none;"></div>
        </div>
        <div id="p-pgn" class="tab-content">
            <textarea id="pgnInput" placeholder="Paste PGN here..." style="background:#333;color:#fff;border:1px solid #444;border-radius:8px;padding:12px;font-size:14px;outline:none;min-height:120px;resize:vertical;width:100%;margin-top:5px;"></textarea>
        </div>
        <select id="depth" class="depth-select">
            <option value="14">⚡ Fast (depth 14 · ~5s/move)</option>
            <option value="16" selected>🧠 Pro  (depth 16 · ~15s/move)</option>
            <option value="18">👑 Deep (depth 18 · ~40s/move)</option>
        </select>
        <button id="runBtn" class="run-btn" onclick="startAnalysis()">Run Game Review</button>
        <div id="statusMsg">Ready to analyze.</div>
        <div id="prog-wrap"><div id="prog-fill"></div></div>
    </div>

    <div id="review-screen">
        <div class="accuracy-header">
            <div class="acc-pill white-p"><span class="acc-val" id="wa-text">—</span><span class="acc-label">White Acc</span></div>
            <div class="acc-pill black-p"><span class="acc-val" id="ba-text">—</span><span class="acc-label">Black Acc</span></div>
        </div>
        <div class="coach-wrap"><div class="coach-avatar">👨🏽‍🏫</div><div class="bubble" id="coach-text">Ready.</div></div>
        <div class="board-box">
            <div id="board-wrapper"><div id="board"></div><div id="badge-layer"></div></div>
            <div class="eval-bar"><div class="efill" id="ef"></div><div class="enum" id="en" style="bottom:4px;">0.0</div></div>
        </div>
        <div class="ribbon" id="rib"></div>
        <button class="btn-secondary" onclick="location.reload()" style="margin-top:0;">↺ Load New Game</button>
        <div style="height:100px;"></div>
    </div>

    <div id="expl-sheet">
        <div class="sheet-handle"></div>
        <button class="sheet-dismiss" onclick="$('#expl-sheet').removeClass('open')">✕</button>
        <div id="sheet-badge" class="sheet-badge"></div>
        <div id="sheet-title" class="sheet-title"></div>
        <div id="sheet-body"  class="sheet-body"></div>
    </div>

    <div id="nav-bar">
        <button id="exitVarBtn" onclick="exitVar()" style="display:none;width:100%;padding:12px;background:#b33430;border:none;color:#fff;font-weight:bold;border-radius:10px;">🔙 Exit Variation</button>
        <div style="display:flex;gap:10px;">
            <button class="run-btn" style="background:#444;margin-top:0;" onclick="nav(-1)">Prev</button>
            <button class="run-btn" style="margin-top:0;"                  onclick="nav(1)">Next</button>
        </div>
    </div>
</div>

<script>
$(document).ready(function () {
    if (typeof Chess === "undefined" || typeof ChessBoard === "undefined") {
        document.body.innerHTML = '<div style="color:#f66;font-family:sans-serif;padding:30px;text-align:center;"><h2>⚠️ Libraries failed to load</h2><p>Check your internet connection and reload.</p><button onclick="location.reload()" style="padding:12px 24px;background:#81b64c;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">↺ Retry</button></div>';
        return;
    }

    // ── Piece values (centipawns) for sacrifice detection ──────
    var PV = { p:100, n:305, b:333, r:563, q:950, k:20000 };

    // ── Date filters ───────────────────────────────────────────
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var now = new Date();
    for (var i = now.getFullYear(); i >= 2010; i--) $("#fYear").append(new Option(i,i));
    months.forEach(function(m,i){ $("#fMonth").append(new Option(m,(i+1).toString().padStart(2,"0"))); });
    for (var i = 1; i <= 31; i++) $("#fDay").append(new Option(i,i));
    $("#fYear").val(now.getFullYear());
    $("#fMonth").val((now.getMonth()+1).toString().padStart(2,"0"));

    // ── State ──────────────────────────────────────────────────
    var selPgn="", board=null, game=new Chess(), engine=null;
    var hData=[], fens=[], evs=[], bMoves=[], aMoves=[], mLine=[];
    var cIdx=-1, stp=0, targetDepth=18, sSq=null;
    var eMode="batch", branchIdx=-1, userColor="white";
    var livePhase=0, preFen="", postFen="", liveBestMove="", livePreEval=0;
    var _pvScore=0, _curBestMove=null;

    window.setTab = function(t){
        $(".tab,.tab-content").removeClass("active");
        if(t==="api"){ $("#t-api,#p-api").addClass("active"); }
        else          { $("#t-pgn,#p-pgn").addClass("active"); }
    };
    window.apiFetch      = apiFetch;
    window.startAnalysis = startAnalysis;
    window.nav           = nav;
    window.exitVar       = exitVar;

    // ══════════════════════════════════════════════════════════
    //  CLASSIFY  —  Chess.com-accurate scale
    // ══════════════════════════════════════════════════════════
    function classify(preFenStr, moveSan, moveObj, evalBefore, evalAfter, turn, bestSan) {

        // Checkmate
        if (moveSan && moveSan.includes("#"))
            return { id:"#", class:"c-best", text:"is Checkmate! 🏆", acc:100, bestMove:null, evalLoss:0 };

        // Centipawn loss from the MOVING side's perspective
        var lossCp = turn === "w"
            ? Math.round((evalBefore - evalAfter) * 100)
            : Math.round((evalAfter  - evalBefore) * 100);
        lossCp = Math.max(-500, Math.min(lossCp, 2000));

        // ── Brilliant detection ─────────────────────────────────────────────
        // CHECK THIS FIRST — a sacrifice that is also the engine's best
        // move must show !! Brilliant, not just ★ Best.
        // Conditions: near-best (≤10cp loss) + piece lands on attacked
        // square that is undefended or where mover gives up more than taken.
        if (lossCp <= 10 && moveObj && preFenStr) {
            try {
                var afterB = new Chess(preFenStr);
                afterB.move({ from:moveObj.from, to:moveObj.to, promotion:"q" });
                var dest  = moveObj.to;
                var piece = afterB.get(dest);

                if (piece) {
                    // Opponent attacks on the destination square
                    var oppAtks = afterB.moves({ verbose:true }).filter(function(m){ return m.to === dest; });

                    if (oppAtks.length > 0) {
                        // Defender count (flip turn trick)
                        var defFen = afterB.fen().replace(/ (w|b) /, function(_,c){ return " "+(c==="w"?"b":"w")+" "; });
                        var defs   = [];
                        try { defs = new Chess(defFen).moves({verbose:true}).filter(function(m){ return m.to===dest; }); } catch(e){}

                        var movedVal    = PV[piece.type]           || 0;
                        var capturedVal = moveObj.captured ? (PV[moveObj.captured] || 0) : 0;

                        var isHanging = oppAtks.length > 0 && defs.length === 0;          // completely undefended
                        var isOverSac = movedVal > capturedVal + 100;                     // giving up more than taking

                        if (isHanging || isOverSac)
                            return { id:"!!", class:"c-brilliant", text:"is Brilliant!!", acc:100, bestMove:null, evalLoss:lossCp/100 };
                    }
                }
            } catch(e) { /* skip brilliant check on error */ }
        }

        // Exact best move (checked after brilliant so sacrifices aren't downgraded)
        if (moveSan === bestSan)
            return { id:"★", class:"c-best", text:"is the Best move", acc:100, bestMove:null, evalLoss:lossCp/100 };

        // ── Standard Chess.com thresholds ────────────────────
        var id, cls, label, acc;
        if      (lossCp <=  10) { id="★";  cls="c-best";       label="Best";       acc=100; }
        else if (lossCp <=  25) { id="✔";  cls="c-great";      label="Great";      acc=95;  }
        else if (lossCp <=  60) { id="✔";  cls="c-good";       label="Good";       acc=88;  }
        else if (lossCp <= 120) { id="?!"; cls="c-inaccuracy"; label="Inaccuracy"; acc=70;  }
        else if (lossCp <= 200) { id="?";  cls="c-mistake";    label="Mistake";    acc=45;  }
        else                    { id="??"; cls="c-blunder";    label="Blunder";    acc=20;  }

        var text = "is " + label;
        if (cls === "c-best" || cls === "c-great") text = "is a " + label + " move";
        if (lossCp > 60 && bestSan) text += ". Better was <b>" + fm(bestSan) + "</b>";

        return { id:id, class:cls, text:text, acc:acc, bestMove:(lossCp>60?bestSan:null), evalLoss:lossCp/100 };
    }

    // ══════════════════════════════════════════════════════════
    //  ENGINE  — depth-based (more consistent than movetime)
    // ══════════════════════════════════════════════════════════
    function loadEngine(cb) {
        var urls = [
            "https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js",
            "https://cdn.jsdelivr.net/npm/stockfish@10.0.2/stockfish.js"
        ];
        function tryLoad(idx) {
            if (idx >= urls.length) { alert("Failed to load Stockfish. Check internet connection."); return; }
            fetch(urls[idx]).then(function(r){
                if (!r.ok) throw new Error();
                return r.text();
            }).then(function(t){
                engine = new Worker(URL.createObjectURL(new Blob([t],{type:"application/javascript"})));
                engine.onmessage = function(e){ handleEngine(e.data); };
                engine.postMessage("uci");
                engine.postMessage("setoption name Threads value 4");
                engine.postMessage("setoption name Hash value 128");
                cb();
            }).catch(function(){ tryLoad(idx+1); });
        }
        tryLoad(0);
    }

    function handleEngine(l) {
        if (l.includes("score cp"))
            _pvScore = parseInt(l.match(/score cp (-?\d+)/)[1]) / 100.0;
        else if (l.includes("score mate"))
            _pvScore = parseInt(l.match(/score mate (-?\d+)/)[1]) > 0 ? 10.0 : -10.0;

        if (l.includes(" pv ")) {
            var m = l.match(/ pv (\S+)/);
            if (m) _curBestMove = m[1];
        }

        if (l.includes("bestmove")) {
            var bm = (l.match(/bestmove\s+(\S+)/) || [])[1] || _curBestMove;

            if (eMode === "batch") {
                evs[stp]    = fens[stp].includes(" b ") ? -_pvScore : _pvScore;
                bMoves[stp] = bm;
                stp++;
                runLoop();
            } else if (eMode === "live") {
                if (livePhase === 1) {
                    liveBestMove = bm;
                    livePreEval  = preFen.includes(" w ") ? _pvScore : -_pvScore;
                    livePhase    = 2;
                    engine.postMessage("position fen " + postFen);
                    var moveCap = targetDepth <= 16 ? 800 : targetDepth <= 18 ? 1500 : 2500;
        engine.postMessage("go depth " + targetDepth + " movetime " + moveCap);
                } else if (livePhase === 2) {
                    liveRes(_pvScore, liveBestMove);
                    livePhase = 0;
                }
            }
        }
    }

    function runLoop() {
        if (stp >= fens.length) return finalize();
        var total = fens.length - 1;
        $("#prog-fill").css("width", (stp/total*100)+"%");
        var pct = total > 0 ? Math.round(stp/total*100) : 0;
        $("#statusMsg").html("Analyzing move " + stp + " / " + total + " &nbsp;<b style=\'color:#81b64c\'>" + pct + "%</b>");
        var c = new Chess(fens[stp]);
        if (c.game_over()) {
            evs[stp]    = c.in_checkmate() ? (fens[stp].includes(" b ") ? -10 : 10) : 0;
            bMoves[stp] = null; stp++; return runLoop();
        }
        _pvScore = 0; _curBestMove = null;
        engine.postMessage("position fen " + fens[stp]);
        engine.postMessage("go depth " + targetDepth);
    }

    function finalize() {
        for (var i = 0; i < hData.length; i++) {
            var turn    = i % 2 === 0 ? "w" : "b";
            var bl      = bMoves[i];
            var tc      = new Chess(fens[i]);
            var bestObj = bl ? tc.move({from:bl.slice(0,2),to:bl.slice(2,4),promotion:"q"}) : null;
            var bestSan = bestObj ? bestObj.san : null;
            var moveObj = hData[i]; // verbose move from game history
            var rating  = classify(fens[i], hData[i].san, moveObj, evs[i], evs[i+1], turn, bestSan);
            aMoves.push({ san:hData[i].san, to:hData[i].to, rating:rating, eval:evs[i+1] });
        }
        mLine = JSON.parse(JSON.stringify(aMoves));

        var pgn4o = $("#p-api").hasClass("active") ? selPgn : $("#pgnInput").val().trim();
        var wm = pgn4o.match(/\[White "([^"]+)"\]/i);
        var bm = pgn4o.match(/\[Black "([^"]+)"\]/i);
        var cu = $("#userInput").val().trim().toLowerCase();
        userColor = (bm && bm[1].toLowerCase()===cu) ? "black" : "white";

        $("#setup-screen").hide();
        $("#review-screen").css("display","flex");
        $("#nav-bar").css("display","flex");

        board = ChessBoard("board", {
            position:"start", orientation:userColor,
            pieceTheme: function(p){ return "https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/wikipedia/"+p+".png"; },
            moveSpeed:"fast"
        });

        $("#board").on("click","[data-square]",function(e){
            if (eMode==="live") return;
            var sq = $(e.target).closest("[data-square]").attr("data-square");
            var p  = game.get(sq);
            if (p && p.color===game.turn()) {
                sSq=sq; clr();
                $(".square-"+sq).addClass("selected-square");
                game.moves({square:sq,verbose:true}).forEach(function(m){ $(".square-"+m.to).addClass(m.captured?"legal-cap":"legal-dot"); });
            } else if (sSq) {
                var v = game.moves({square:sSq,verbose:true}).find(function(m){ return m.to===sq; });
                if (v) playMan(sSq,sq);
                sSq=null; clr();
            }
        });
        buildRib(); jump(0);
    }

    // ── Chess.com fetch ────────────────────────────────────────
    async function apiFetch() {
        var u = $("#userInput").val().trim(); if(!u) return;
        var y = $("#fYear").val(), m = $("#fMonth").val(), dFilter = $("#fDay").val();
        if(!y||!m){ $("#statusMsg").text("Select year and month."); return; }
        $("#statusMsg").text("Searching…");
        var directUrl = "https://api.chess.com/pub/player/"+u+"/games/"+y+"/"+m;
        var proxyUrl  = "https://corsproxy.io/?"+encodeURIComponent(directUrl);
        var gD=null;
        for (var attempt=0;attempt<2;attempt++) {
            try {
                var r = await fetch(attempt===0?directUrl:proxyUrl);
                if(!r.ok) throw new Error("HTTP "+r.status);
                gD = await r.json(); break;
            } catch(e) { if(attempt===1){ $("#statusMsg").text("Network error."); return; } }
        }
        var list = $("#glBox").empty().show();
        if(!gD||!gD.games||!gD.games.length){ $("#statusMsg").text("No games found."); return; }
        var games = [...gD.games].reverse();
        if(dFilter!=="all") games = games.filter(function(g){ return new Date(g.end_time*1000).getDate()==parseInt(dFilter); });
        if(!games.length){ $("#statsBar").hide(); $("#statusMsg").text("No games found for this date."); return; }

        var wins=0,losses=0,draws=0,totalAcc=0,accCount=0;
        games.forEach(function(g){
            var isW = g.white.username.toLowerCase()===u.toLowerCase();
            var res = isW?g.white.result:g.black.result;
            if(res==="win") wins++;
            else if(["checkmated","resigned","timeout","abandoned","lose"].includes(res)) losses++;
            else draws++;
            var acc = isW?(g.accuracies&&g.accuracies.white):(g.accuracies&&g.accuracies.black);
            if(acc!=null&&acc>0){totalAcc+=acc;accCount++;}
        });
        $("#statWins").text(wins); $("#statLosses").text(losses); $("#statDraws").text(draws);
        $("#statAcc").text(accCount>0?(totalAcc/accCount).toFixed(1)+"%":"—");
        $("#statsBar").css("display","flex");

        games.forEach(function(g,i){
            var isW = g.white.username.toLowerCase()===u.toLowerCase(), opp=isW?g.black:g.white;
            var res = isW?g.white.result:g.black.result;
            var rc  = res==="win"?"win":["checkmated","resigned","timeout","abandoned","lose"].includes(res)?"loss":"draw";
            var rl  = rc==="win"?"WIN":rc==="loss"?"LOSS":"DRAW";
            var acc = isW?(g.accuracies&&g.accuracies.white):(g.accuracies&&g.accuracies.black);
            var card = $("<div>").addClass("game-card").click(function(){ $(".game-card").removeClass("selected"); $(this).addClass("selected"); selPgn=g.pgn; $("#statusMsg").text("Selected. Tap Run!"); });
            var av  = $("<div>").addClass("gc-avatar").attr("id","av-"+i).append($("<img>").attr("src",""));
            var det = $("<div>").addClass("gc-details")
                .append($("<div>").addClass("gc-opp").html(opp.username+" <span class='sel-icon'>✅</span>"))
                .append($("<div>").addClass("gc-meta").text(g.time_class+(acc!=null?" · "+acc.toFixed(1)+"%":"")+" • "+new Date(g.end_time*1000).toLocaleDateString()));
            card.append(av,det,$("<div>").addClass("gc-res "+rc).text(rl));
            list.append(card);
            // Try direct avatar URL first (chess.com stores them at a predictable path)
            (function(idx, username){
                var directAvatar = "https://www.chess.com/bundles/web/images/user-image.007dad08.svg";
                var apiUrl = "https://api.chess.com/pub/player/" + username;
                var proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(apiUrl);
                fetch(apiUrl).then(function(r){ return r.json(); })
                    .then(function(p){ if(p.avatar){ $("#av-"+idx+" img").attr("src", p.avatar).show(); } })
                    .catch(function(){
                        fetch(proxyUrl).then(function(r){ return r.json(); })
                            .then(function(p){ if(p.avatar){ $("#av-"+idx+" img").attr("src", p.avatar).show(); } })
                            .catch(function(){});
                    });
            })(i, opp.username);
        });
        $("#statusMsg").text("Found "+games.length+" game(s). Tap one to select.");
    }

    // ── Start analysis ─────────────────────────────────────────
    function startAnalysis() {
        var p = $("#p-api").hasClass("active") ? selPgn : $("#pgnInput").val().trim();
        if(!p) return alert("Select or paste a game first.");
        targetDepth = parseInt($("#depth").val());
        $("#runBtn").prop("disabled",true);
        if(!engine){ $("#statusMsg").text("Loading engine…"); loadEngine(function(){ engine.postMessage("ucinewgame"); prep(p); }); }
        else { engine.postMessage("ucinewgame"); prep(p); }
    }

    function prep(p) {
        game.reset();
        var ms = p.replace(/\[.*?\]/sg,"").replace(/\{.*?\}/sg,"").trim().replace(/\d+\.+/g," ").replace(/\n/g," ").split(/\s+/);
        for (var m of ms) if(m!==""&&(isNaN(m[0])||m==="0-0"||m==="0-0-0")) if(game.move(m)===null) break;
        hData = game.history({verbose:true});
        if(!hData.length) return alert("Invalid PGN.");
        var t=new Chess(); fens=[t.fen()];
        hData.forEach(function(m){ t.move(m); fens.push(t.fen()); });
        $("#prog-wrap").show();
        evs=new Array(fens.length).fill(0); bMoves=new Array(fens.length).fill(null);
        aMoves=[]; stp=0; eMode="batch";
        runLoop();
    }

    // ── Live manual play ───────────────────────────────────────
    function playMan(s,t) {
        preFen = game.fen();
        var move = game.move({from:s,to:t,promotion:"q"}); if(!move) return;
        if(eMode!=="live") branchIdx=cIdx;
        cIdx++; aMoves=aMoves.slice(0,cIdx);
        aMoves.push({san:move.san,to:move.to,rating:{id:"…",class:"c-good",text:"Analyzing…",acc:0},eval:0});
        $("#exitVarBtn").show(); updateNavH(); buildRib(); jump(cIdx);
        if(game.in_checkmate()){ aMoves[cIdx].rating={id:"#",class:"c-best",text:"is Checkmate! 🏆",acc:100}; eMode="idle"; buildRib(); jump(cIdx); return; }
        if(game.game_over())   { aMoves[cIdx].rating={id:"½",class:"c-good",text:"ends the game (Draw)",acc:80}; eMode="idle"; buildRib(); jump(cIdx); return; }
        postFen=game.fen(); eMode="live"; livePhase=1;
        engine.postMessage("position fen "+preFen);
        engine.postMessage("go depth "+targetDepth);
    }

    function liveRes(s, bm) {
        var postColor  = postFen.includes(" w ") ? "w" : "b";
        var evalAfterW = postColor==="w" ? s : -s;
        var mover      = preFen.includes(" w ") ? "w" : "b";
        var tmp        = new Chess(preFen);
        var bestObj    = bm ? tmp.move({from:bm.slice(0,2),to:bm.slice(2,4),promotion:"q"}) : null;
        var bestSan    = bestObj ? bestObj.san : null;
        var playedSan  = aMoves[cIdx].san;
        var tmp2       = new Chess(preFen);
        var moveObj    = tmp2.moves({verbose:true}).find(function(m){ return m.san===playedSan; }) || null;
        aMoves[cIdx].eval   = evalAfterW;
        aMoves[cIdx].rating = classify(preFen, playedSan, moveObj, livePreEval, evalAfterW, mover, bestSan);
        eMode="idle"; buildRib(); jump(cIdx);
    }

    function exitVar() {
        clr(); sSq=null;
        aMoves=JSON.parse(JSON.stringify(mLine)); eMode="batch";
        $("#exitVarBtn").hide(); updateNavH();
        buildRib(); jump(branchIdx>-1?branchIdx:0);
    }

    // ── UI ─────────────────────────────────────────────────────
    function buildRib() {
        var r=$("#rib").empty();
        aMoves.forEach(function(m,i){
            r.append($("<div>").addClass("m-item").attr("id","r"+i)
                .text(((i%2===0)?Math.floor(i/2)+1+".":"")+" "+fm(m.san))
                .click(function(){ jump(i); }));
        });
    }

    function jump(x) {
        $("#expl-sheet").removeClass("open");
        game.reset(); for(var i=0;i<=x;i++) game.move(aMoves[i].san);
        cIdx=x; board.position(game.fen());
        var d=aMoves[x], e=d.eval;
        var ed=Math.abs(e)>=9.9?(e>0?"+M":"-M"):(e>0?"+":"")+e.toFixed(1);

        $("#coach-text").html("<span style='padding:2px 8px;border-radius:4px;color:#fff;' class='"+d.rating.class+"'>"+d.rating.id+"</span> <b>"+fm(d.san)+"</b> "+d.rating.text);
        $("#en").text(ed).css({color:e>=0?"#000":"#fff", bottom:e>=0?"auto":"4px", top:e>=0?"4px":"auto"});
        $("#ef").css("height",Math.max(0,Math.min(100,50+(e*10)))+"%");

        var files="abcdefgh", col=files.indexOf(d.to[0]), row=8-parseInt(d.to[1]);
        if(userColor==="black"){col=7-col;row=7-row;}
        $("#badge-layer").html('<div class="move-badge '+d.rating.class+'" style="top:'+(row*12.5)+'%;left:'+(col*12.5+6.25)+'%;">'+d.rating.id+'</div>');

        var wa=0,wm=0,ba=0,bm=0;
        for(var k=0;k<=x;k++){
            var t=(k%2===0)?"w":"b";
            if(aMoves[k].rating.acc>0){ if(t==="w"){wa+=aMoves[k].rating.acc;wm++;}else{ba+=aMoves[k].rating.acc;bm++;} }
        }
        $("#wa-text").text(wm>0?(wa/wm).toFixed(0):"—");
        $("#ba-text").text(bm>0?(ba/bm).toFixed(0):"—");

        $(".m-item").removeClass("active");
        if($("#r"+x).length) $("#r"+x).addClass("active")[0].scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});

        var sheetClasses=["c-brilliant","c-inaccuracy","c-mistake","c-blunder"];
        if(sheetClasses.includes(d.rating.class)) showSheet(d);
    }

    function showSheet(d) {
        var labels={"c-brilliant":"!! Brilliant","c-inaccuracy":"?! Inaccuracy","c-mistake":"? Mistake","c-blunder":"?? Blunder"};
        $("#sheet-badge").attr("class","sheet-badge "+d.rating.class).text(labels[d.rating.class]||"");
        var parts = d.rating.text.split(". Better was");
        var title = "<b>"+fm(d.san)+"</b> "+parts[0];
        if(parts[1]) title+="<br><span style='font-size:13px;color:#aaa;font-weight:400'>Better was"+parts[1]+"</span>";
        $("#sheet-title").html(title);
        $("#sheet-body").html(buildExpl(d));
        updateNavH();
        $("#expl-sheet").addClass("open");
    }

    function buildExpl(d) {
        var loss = d.rating.evalLoss || 0;
        var best = d.rating.bestMove ? "The engine recommends <b>"+fm(d.rating.bestMove)+"</b> instead." : "";
        if (d.rating.class==="c-brilliant") return "This is a piece sacrifice that is very difficult to find. The engine confirms it is the strongest move despite leaving material en prise.";
        if (loss >= 2)   return "This move allows the opponent a strong reply that wins material or a decisive positional advantage. "+best;
        if (loss >= 1.2) return "This move misses the key idea in the position, handing the opponent the initiative. "+best;
        return "This move is slightly passive, giving the opponent an easier game without compensation. "+best;
    }

    function updateNavH() {
        requestAnimationFrame(function(){
            var h = document.getElementById("nav-bar").offsetHeight;
            document.documentElement.style.setProperty("--nav-h",(h+4)+"px");
        });
    }

    function clr(){ $("#board [data-square]").removeClass("selected-square legal-dot legal-cap"); }
    function nav(d){ var n=cIdx+d; if(n>=0&&n<aMoves.length) jump(n); }
    function fm(san){
        if(!san) return san;
        if(san==="O-O-O"||san==="0-0-0") return "Long Castle";
        if(san==="O-O"||san==="0-0")     return "Short Castle";
        return san;
    }
});
</script>
