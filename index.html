<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Game Review</title>
    <script>
        // Inline jQuery fallback loader — runs before any CDN tag
        window._libsReady = false;
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"
            onerror="this.onerror=null;this.src='https://code.jquery.com/jquery-3.6.0.min.js'"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"
            onerror="this.onerror=null;this.src='https://unpkg.com/chess.js@0.10.3/chess.min.js'"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"
            onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js'"></script>
    <style>
        :root { --bg: #21201d; --panel: #262421; --accent: #81b64c; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; width: 100%; }
        .app-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
        #setup-screen { background: var(--panel); padding: 20px; border-radius: 12px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tab-container { display: flex; width: 100%; margin-bottom: 15px; background: #111; border-radius: 8px; overflow: hidden; padding: 3px; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; color: #888; background: transparent; border: none; transition: 0.2s; }
        .tab.active { background: #333; color: #fff; border-bottom: 2px solid var(--accent); }
        .tab-content { display: none; flex-direction: column; }
        .tab-content.active { display: flex; }
        
        .search-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        input { flex: 1; background: #333; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 16px; outline: none; }
        .btn-search { background: #555; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-weight: bold; cursor: pointer; height: 46px; }
        
        /* New Filter Row Styles */
        .filter-row { display: flex; gap: 5px; margin-bottom: 10px; justify-content: space-between; }
        .filter-row select { flex: 1; background: #333; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 8px; font-size: 12px; appearance: none; text-align: center; }

        .game-list { max-height: 280px; overflow-y: auto; background: #1a1917; border-radius: 8px; border: 1px solid #333; margin-top: 5px; width: 100%; }
        .game-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.1s; gap: 12px; position: relative; width: 100%; }
        .game-card.selected { background: rgba(129, 182, 76, 0.15); border-left: 5px solid var(--accent); }
        .gc-avatar { width: 44px; height: 44px; background: #444; border-radius: 6px; overflow: hidden; flex-shrink: 0; border: 1px solid #555; display: flex; align-items: center; justify-content: center; position: relative; }
        .gc-avatar img { width: 100%; height: 100%; object-fit: cover; z-index: 2; position: relative; }
        .gc-avatar::before { content: "👤"; position: absolute; font-size: 20px; z-index: 1; opacity: 0.3; }
        .gc-details { flex: 1; min-width: 0; }
        .gc-opp { font-size: 14px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 6px; }
        .gc-meta { font-size: 11px; color: #777; margin-top: 3px; }
        .gc-res { font-weight: bold; font-size: 11px; padding: 5px 10px; border-radius: 6px; min-width: 65px; text-align: center; }
        .win { background: rgba(129, 182, 76, 0.2); color: #81b64c; border: 1px solid #81b64c; }
        .draw { background: rgba(240, 193, 92, 0.2); color: #f0c15c; border: 1px solid #f0c15c; }
        .loss { background: rgba(179, 52, 48, 0.2); color: #b33430; border: 1px solid #b33430; }
        .sel-icon { color: #81b64c; font-size: 16px; display: none; }
        .game-card.selected .sel-icon { display: inline; }
        
        .depth-select { width: 100%; padding: 14px; margin-top: 15px; background: #333; color: #fff; border: 1px solid #444; border-radius: 10px; font-size: 14px; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 18px; cursor: pointer; }
        .run-btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 18px; margin-top: 15px; box-shadow: 0 4px 0 #5d8b33; }
        
        #statusMsg { color: #ffaa00; font-size: 13px; margin: 10px 0; text-align: center; font-weight: bold; }
        #prog-wrap { display: none; height: 10px; background: #111; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #prog-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s linear; }
        
        #review-screen { display: none; width: 100%; flex-direction: column; gap: 10px; }
        .accuracy-header { display: flex; width: 100%; background: #302e2b; border-radius: 10px; overflow: hidden; padding: 4px; gap: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .acc-pill { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; border-radius: 6px; }
        .acc-pill.white-p { background: #f1f1f1; color: #000; }
        .acc-pill.black-p { background: #444; color: #fff; }
        .acc-val { font-size: 22px; font-weight: 900; line-height: 1; }
        .acc-label { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 4px; opacity: 0.7; }
        
        .coach-wrap { display: flex; align-items: center; width: 100%; gap: 8px; }
        .coach-avatar { font-size: 45px; line-height: 1; flex-shrink: 0; }
        .bubble { flex: 1; background: #fff; color: #000; padding: 10px 14px; border-radius: 20px; border-bottom-left-radius: 2px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Slide-up explanation sheet */
        #expl-sheet { position: fixed; left: 0; right: 0; bottom: -400px; z-index: 998; background: #1c1c1e; border-radius: 20px 20px 0 0; padding: 0 16px 20px; box-shadow: 0 -4px 24px rgba(0,0,0,0.6); transition: bottom 0.32s cubic-bezier(0.4,0,0.2,1); max-height: 55vh; overflow-y: auto; }
        #expl-sheet.open { bottom: var(--nav-h, 85px); }
        .sheet-handle { width: 36px; height: 4px; background: #555; border-radius: 2px; margin: 10px auto 14px; }
        .sheet-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
        .sheet-badge.c-inaccuracy { background: rgba(240,193,92,0.15); color: #f0c15c; border: 1px solid rgba(240,193,92,0.3); }
        .sheet-badge.c-mistake    { background: rgba(230,145,44,0.15); color: #e6912c; border: 1px solid rgba(230,145,44,0.3); }
        .sheet-badge.c-blunder    { background: rgba(179,52,48,0.15);  color: #e05550; border: 1px solid rgba(179,52,48,0.3); }
        .sheet-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 8px; line-height: 1.3; }
        .sheet-body  { font-size: 14px; color: #aaa; line-height: 1.6; }
        .sheet-body b { color: #81b64c; }
        .sheet-dismiss { position: absolute; top: 12px; right: 16px; background: #333; border: none; color: #888; font-size: 16px; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .board-box { display: flex; gap: 10px; width: 100%; }
        #board-wrapper { flex: 1; position: relative; border-radius: 6px; border: 3px solid #333; overflow: hidden; }
        #badge-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .eval-bar { width: 28px; background: #333; border-radius: 6px; overflow: hidden; position: relative; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid #444; }
        .efill { width: 100%; height: 50%; background: #fff; transition: height 0.3s ease-out; }
        .enum { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: bold; z-index: 10; }
        .ribbon { display: flex; overflow-x: auto; background: #302e2b; padding: 12px; border-radius: 8px; gap: 10px; min-height: 48px; scroll-behavior: smooth; }
        .m-item { color: #888; cursor: pointer; white-space: nowrap; padding: 6px 10px; border-radius: 4px; font-size: 14px; }
        .m-item.active { color: #fff; background: #444; border-bottom: 3px solid var(--accent); }
        
        .move-badge { position: absolute; width: 22px; height: 22px; border-radius: 50%; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; transform: translate(-50%, -50%); box-shadow: 0 2px 6px rgba(0,0,0,0.6); z-index: 200; }
        .c-brilliant { background: #15d1ba; color: #000; } .c-great { background: #5c8bb0; } .c-best { background: #95bb4a; }
        .c-good { background: #96af8b; } .c-inaccuracy { background: #f0c15c; color: #000; } .c-mistake { background: #e6912c; } .c-blunder { background: #b33430; }
        [data-square] { position: relative; } .selected-square { background-color: rgba(129, 182, 76, 0.5) !important; }
        .legal-dot::after { content: ""; position: absolute; top: 50%; left: 50%; width: 26%; height: 26%; background: rgba(0,0,0,0.2); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .legal-cap::after { content: ""; position: absolute; top: 50%; left: 50%; width: 80%; height: 80%; border: 6px solid rgba(0,0,0,0.2); border-radius: 50%; transform: translate(-50%, -50%); box-sizing: border-box; pointer-events: none; }
        
        .btn-secondary { width: 100%; padding: 12px; background: #444; border: none; color: #ccc; font-weight: bold; border-radius: 8px; margin-top: 15px; cursor: pointer; transition: 0.2s; border: 1px solid #555; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="setup-screen">
        <h2 style="margin: 0 0 15px 0; text-align: center; color: var(--accent);">♟️ Pro Game Review</h2>
        <div class="tab-container">
            <button class="tab active" id="t-api" onclick="setTab('api')">Chess.com</button>
            <button class="tab" id="t-pgn" onclick="setTab('pgn')">Paste PGN</button>
        </div>
        <div id="p-api" class="tab-content active">
            <div class="search-row">
                <input type="text" id="userInput" placeholder="Username">
                <button onclick="apiFetch()" class="btn-search">Search</button>
            </div>
            <div class="filter-row">
                <select id="fYear"></select>
                <select id="fMonth"></select>
                <select id="fDay">
                    <option value="all">Any Day</option>
                </select>
            </div>
            <div id="statsBar" style="display:none; background:#1e2d14; border:1px solid #3a5c28; border-radius:8px; padding:10px 14px; margin-top:8px; display:none; flex-direction:row; justify-content:space-between; align-items:center; gap:8px;"><div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#81b64c;" id="statWins">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Wins</div></div><div style="width:1px;background:#3a5c28;align-self:stretch;"></div><div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#b33430;" id="statLosses">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Losses</div></div><div style="width:1px;background:#3a5c28;align-self:stretch;"></div><div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#f0c15c;" id="statDraws">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Draws</div></div><div style="width:1px;background:#3a5c28;align-self:stretch;"></div><div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#fff;" id="statAcc">—</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Avg Acc</div></div></div><div class="game-list" id="glBox" style="display: none;"></div>
        </div>
        <div id="p-pgn" class="tab-content"><textarea id="pgnInput" placeholder="Paste PGN here..."></textarea></div>
        <select id="depth" class="depth-select"><option value="300">⚡ Fast Review (0.3s/move)</option><option value="600" selected>🧠 Pro Review (0.6s/move)</option><option value="1500">👑 GM Review (1.5s/move)</option></select>
        <button id="runBtn" class="run-btn" onclick="startAnalysis()">Run Game Review</button>
        <div id="statusMsg">Ready to analyze.</div>
        <div id="prog-wrap"><div id="prog-fill"></div></div>
    </div>

    <div id="review-screen">
        <div class="accuracy-header">
            <div class="acc-pill white-p"><span class="acc-val" id="wa-text">100</span><span class="acc-label">White Acc</span></div>
            <div class="acc-pill black-p"><span class="acc-val" id="ba-text">100</span><span class="acc-label">Black Acc</span></div>
        </div>
        <div class="coach-wrap"><div class="coach-avatar">👨🏽‍🏫</div><div class="bubble" id="coach-text">Ready.</div></div>
        <div class="board-box">
            <div id="board-wrapper"><div id="board"></div><div id="badge-layer"></div></div>
            <div class="eval-bar"><div class="efill" id="ef"></div><div class="enum" id="en" style="bottom:4px;">0.0</div></div>
        </div>
        <div class="ribbon" id="rib"></div>
        <button class="btn-secondary" onclick="location.reload()">↺ Load New Game</button>
        <div style="height: 90px;"></div><!-- spacer so content clears fixed bar -->
    </div>
    <!-- Slide-up explanation sheet -->
    <div id="expl-sheet">
        <div class="sheet-handle"></div>
        <button class="sheet-dismiss" onclick="$('#expl-sheet').removeClass('open')">✕</button>
        <div id="sheet-badge" class="sheet-badge"></div>
        <div id="sheet-title" class="sheet-title"></div>
        <div id="sheet-body"  class="sheet-body"></div>
    </div>
    <!-- Fixed bottom nav bar -->
    <div id="nav-bar" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#21201d; padding:10px 16px 24px; flex-direction:column; gap:6px; z-index:999; border-top:1px solid #333;">
        <button id="exitVarBtn" onclick="exitVar()" style="display:none; width:100%; padding:12px; background:#b33430; border:none; color:#fff; font-weight:bold; border-radius:10px;">🔙 Exit Variation</button>
        <div style="display:flex; gap:10px;"><button class="run-btn" style="background:#444;" onclick="nav(-1)">Prev</button><button class="run-btn" onclick="nav(1)">Next</button></div>
    </div>
</div>
<script>
$(document).ready(function() {
    // ── Library sanity check ──────────────────────────────
    if(typeof Chess === "undefined" || typeof ChessBoard === "undefined") {
        document.body.innerHTML = '<div style="color:#f66;font-family:sans-serif;padding:30px;text-align:center;"><h2>⚠️ Libraries failed to load</h2><p>Please check your internet connection and reload the page.</p><button onclick="location.reload()" style="padding:12px 24px;background:#81b64c;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">↺ Retry</button></div>';
        return;
    }

    // ── Initialize Filter Values ──────────────────────────
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const now = new Date();
    for(let i=now.getFullYear(); i>=2010; i--) $('#fYear').append(new Option(i, i));
    months.forEach((m, i) => $('#fMonth').append(new Option(m, (i+1).toString().padStart(2, '0'))));
    for(let i=1; i<=31; i++) $('#fDay').append(new Option(i, i));
    $('#fYear').val(now.getFullYear());
    $('#fMonth').val((now.getMonth()+1).toString().padStart(2, '0'));

    var selPgn = "", board = null, game = new Chess(), engine = null, hData = [], fens = [], evs = [], bMoves = [], aMoves = [], mLine = [], cIdx = -1, stp = 0, depth = 16, moveTime = 600, sSq = null, eMode = "batch", branchIdx = -1, userColor = "white";
    var livePhase = 0, preFen = "", postFen = "", liveBestMove = "", livePreEval = 0, explCache = {};
    // Expose functions called from HTML onclick attributes
    window.setTab = function(t) { $(".tab").removeClass("active"); $(".tab-content").removeClass("active"); if(t=='api'){ $("#t-api").addClass("active"); $("#p-api").addClass("active"); } else { $("#t-pgn").addClass("active"); $("#p-pgn").addClass("active"); } };
    window.apiFetch = apiFetch;
    window.startAnalysis = startAnalysis;
    window.nav = nav;
    window.exitVar = exitVar;
    
    async function apiFetch() {
        var u = $("#userInput").val().trim(); if(!u) return;
        var y = $("#fYear").val(), m = $("#fMonth").val(), dFilter = $("#fDay").val();
        if(!y || !m) { $("#statusMsg").text("Please select year and month."); return; }
        $("#statusMsg").text("Searching Archives...");
        var directUrl = "https://api.chess.com/pub/player/"+u+"/games/"+y+"/"+m;
        var proxyUrl  = "https://corsproxy.io/?"+encodeURIComponent(directUrl);
        var gD = null;
        // Try direct first, fall back to CORS proxy (needed when opened as local file)
        for(var attempt = 0; attempt < 2; attempt++) {
            try {
                var r = await fetch(attempt === 0 ? directUrl : proxyUrl);
                if(!r.ok) throw new Error("HTTP "+r.status);
                gD = await r.json(); break;
            } catch(e) {
                if(attempt === 1) { $("#statusMsg").text("Network error. Check connection & username."); return; }
            }
        }
        var list = $("#glBox").empty().show();
        if(!gD || !gD.games || gD.games.length === 0) { $("#statusMsg").text("No games found for "+y+"/"+m); return; }
        var filteredGames = [...gD.games].reverse();
        if(dFilter !== "all") {
            filteredGames = filteredGames.filter(g => {
                let date = new Date(g.end_time * 1000);
                return date.getDate() == parseInt(dFilter);
            });
        }
        if(filteredGames.length === 0) { $("#statsBar").hide(); $("#statusMsg").text("No games found for this date."); return; }

        // Compute stats
        var wins = 0, losses = 0, draws = 0, totalAcc = 0, accCount = 0;
        filteredGames.forEach(g => {
            var isW = g.white.username.toLowerCase() === u.toLowerCase();
            var result = isW ? g.white.result : g.black.result;
            if(result === "win") wins++;
            else if(["checkmated","resigned","timeout","abandoned","lose"].includes(result)) losses++;
            else draws++;
            // Chess.com sometimes includes accuracy in the game object
            var acc = isW ? (g.accuracies ? g.accuracies.white : null) : (g.accuracies ? g.accuracies.black : null);
            if(acc != null && acc > 0) { totalAcc += acc; accCount++; }
        });
        $("#statWins").text(wins);
        $("#statLosses").text(losses);
        $("#statDraws").text(draws);
        $("#statAcc").text(accCount > 0 ? (totalAcc / accCount).toFixed(1) + "%" : "—");
        $("#statsBar").css("display","flex");

        filteredGames.forEach((g, i) => {
            var isW = g.white.username.toLowerCase() === u.toLowerCase(), opp = isW ? g.black : g.white;
            var result = isW ? g.white.result : g.black.result;
            var resClass = result === "win" ? "win" : ["checkmated","resigned","timeout","abandoned","lose"].includes(result) ? "loss" : "draw";
            var resLabel = result === "win" ? "WIN" : ["checkmated","resigned","timeout","abandoned","lose"].includes(result) ? "LOSS" : "DRAW";
            var acc = isW ? (g.accuracies ? g.accuracies.white : null) : (g.accuracies ? g.accuracies.black : null);
            var accStr = acc != null ? " · " + acc.toFixed(1) + "%" : "";
            var card = $("<div>").addClass("game-card").click(function(){ $(".game-card").removeClass("selected"); $(this).addClass("selected"); selPgn = g.pgn; $("#statusMsg").text("Selected. Click Run!"); });
            var av = $("<div>").addClass("gc-avatar").attr("id", "av-"+i).append($("<img>").attr("src", ""));
            var det = $("<div>").addClass("gc-details").append($("<div>").addClass("gc-opp").html(opp.username + " <span class='sel-icon'>✅</span>")).append($("<div>").addClass("gc-meta").text(g.time_class + accStr + " • " + new Date(g.end_time*1000).toLocaleDateString()));
            card.append(av, det, $("<div>").addClass("gc-res "+resClass).text(resLabel)); list.append(card);
            fetch("https://api.chess.com/pub/player/"+opp.username).then(res=>res.json()).then(p=>{ if(p.avatar) $("#av-"+i+" img").attr("src", p.avatar); else $("#av-"+i+" img").hide(); }).catch(()=>{});
        });
        $("#statusMsg").text("Found "+filteredGames.length+" game(s). Tap one to select.");
    }

    function startAnalysis() {
        var p = $("#p-api").hasClass("active") ? selPgn : $("#pgnInput").val().trim(); if(!p) return alert("Select game!");
        depth = parseInt($("#depth").val()); moveTime = depth; $("#runBtn").prop("disabled", true);
        if(!engine) {
            fetch("https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js").then(r=>r.text()).then(t=>{
                engine = new Worker(URL.createObjectURL(new Blob([t], {type:"application/javascript"})));
                engine.onmessage = e => handleEngine(e.data);
                engine.postMessage("uci");
                engine.postMessage("setoption name Threads value 64");
                engine.postMessage("setoption name Hash value 256");
                prep(p);
            });
        } else { engine.postMessage("ucinewgame"); prep(p); }
    }
    function prep(p) {
        game.reset(); var ms = p.replace(/\[.*?\]/sg, "").replace(/\{.*?\}/sg, "").trim().replace(/\d+\.+/g, " ").replace(/\n/g, " ").split(/\s+/);
        for(let m of ms) { if(m!="" && (isNaN(m[0]) || m==="0-0" || m==="0-0-0")) if(game.move(m)===null) break; }
        hData = game.history({verbose:true}); if(hData.length==0) return alert("Bad PGN.");
        var t=new Chess(); fens=[t.fen()]; hData.forEach(m=>{t.move(m); fens.push(t.fen());});
        $("#prog-wrap").show(); evs=new Array(fens.length).fill(0); bMoves=new Array(fens.length).fill(null); stp=0; eMode = "batch"; runLoop();
    }
    function runLoop() {
        if(stp >= fens.length) return finalize();
        var total = fens.length - 1; $("#prog-fill").css("width", (stp/total*100)+"%"); $("#statusMsg").text("Reviewing " + stp + " / " + total);
        var c = new Chess(fens[stp]);
        if(c.game_over()){ evs[stp]=c.in_checkmate()?(fens[stp].includes(" b ")?-10:10):0; stp++; return runLoop(); }
        engine.postMessage("position fen "+fens[stp]); engine.postMessage("go movetime "+moveTime);
    }
    var _curSc = 0;
    function handleEngine(l) {
        if(l.includes("score cp")) _curSc = parseInt(l.match(/score cp (-?\d+)/)[1])/100.0;
        else if(l.includes("score mate")) _curSc = parseInt(l.match(/score mate (-?\d+)/)[1])>0?10.0:-10.0;
        else if(l.includes("bestmove")) {
            var bm = l.match(/bestmove\s+(\S+)/)[1];
            if(eMode == "batch") { evs[stp]=fens[stp].includes(" b ")?-_curSc:_curSc; bMoves[stp]=bm; stp++; runLoop(); }
            else if(eMode == "live") {
                if(livePhase == 1) {
                    // Phase 1: got best alternative and eval FROM the pre-move position
                    liveBestMove = bm;
                    // Normalize Phase 1 score to white's perspective for use as baseline
                    var preMover = preFen.includes(" w ") ? "w" : "b";
                    livePreEval = (preMover == "w") ? _curSc : -_curSc;
                    livePhase = 2;
                    // Phase 2: evaluate POST-move position for the actual resulting score
                    engine.postMessage("position fen " + postFen);
                    engine.postMessage("go movetime " + moveTime);
                } else if(livePhase == 2) {
                    // Phase 2: got eval from POST-move position
                    liveRes(_curSc, liveBestMove);
                    livePhase = 0;
                }
            }
        }
    }
    function finalize() {
        for(var i=0; i<hData.length; i++){
            var turn=(i%2==0)?"w":"b", bl=bMoves[i], tc=new Chess(fens[i]), mt=bl?tc.move({from:bl.slice(0,2),to:bl.slice(2,4),promotion:"q"}):null;
            var r = classify(hData[i].san, evs[i], evs[i+1], turn, (mt?mt.san:null));
            aMoves.push({san:hData[i].san, to:hData[i].to, rating:r, eval:evs[i+1]});
        }
        mLine = JSON.parse(JSON.stringify(aMoves));
        // Detect which color the user played to orient the board correctly
        var activeTab = $("#p-api").hasClass("active");
        var pgn4orient = activeTab ? selPgn : $("#pgnInput").val().trim();
        var wm = pgn4orient.match(/\[White "([^"]+)"\]/i);
        var bm = pgn4orient.match(/\[Black "([^"]+)"\]/i);
        var currentUser = $("#userInput").val().trim().toLowerCase();
        userColor = "white";
        if(bm && bm[1].toLowerCase() === currentUser) userColor = "black";
        $("#setup-screen").hide(); $("#review-screen").css("display","flex"); $("#nav-bar").css("display","flex");
        board = ChessBoard("board", {position:"start", orientation: userColor, pieceTheme:p=>"https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/wikipedia/"+p+".png", moveSpeed:"fast"});
        $("#board").on("click", "[data-square]", function(e){
            if(eMode == "live") return;
            var q=$(e.target).closest("[data-square]").attr("data-square"), p=game.get(q);
            if(p && p.color==game.turn()){ sSq=q; clr(); $(".square-"+q).addClass("selected-square"); game.moves({square:q, verbose:true}).forEach(m=>{$(".square-"+m.to).addClass(m.captured?"legal-cap":"legal-dot")}); }
            else if(sSq){ var v=game.moves({square:sSq, verbose:true}).find(m=>m.to==q); if(v){ playMan(sSq, q); } sSq=null; clr(); }
        });
        buildRib(); jump(0);
    }
    function friendlyMove(san) {
        if(!san) return san;
        if(san === "O-O-O" || san === "0-0-0") return "Long Castle";
        if(san === "O-O"   || san === "0-0")   return "Short Castle";
        return san;
    }
    function classify(s,e,a,t,b){
        if(s.includes("#")) return {id:"#", class:"c-best", text:"is a Checkmate!", acc:100, bestMove:null};
        if(s==b) return {id:"★", class:"c-best", text:"is the Best move", acc:100, bestMove:null};
        var l=(t=="w")?(e-a):(a-e), ac=l<=0.1?100:Math.max(10,100-(l*30));
        var msg="is Good", cls="c-good", sym="✔";
        if(l>3){msg="is a Blunder"; cls="c-blunder"; sym="??";} 
        else if(l>1.2){msg="is a Mistake"; cls="c-mistake"; sym="?";} 
        else if(l>0.6){msg="is an Inaccuracy"; cls="c-inaccuracy"; sym="?!";}
        else if(l<-0.2 && ac>=98){msg="is Brilliant!!"; cls="c-brilliant"; sym="!!";}
        if(l>0.6 && b) msg += ". Better was <b>"+friendlyMove(b)+"</b>";
        return {id:sym, class:cls, text:msg, acc:ac, bestMove:(l>0.6?b:null), evalLoss:l};
    }
    function playMan(s,t){
        preFen = game.fen(); // capture PRE-move position
        var move = game.move({from:s, to:t, promotion:"q"}); if(!move) return;
        if(eMode != "live") branchIdx = cIdx;
        cIdx++; aMoves = aMoves.slice(0, cIdx);
        aMoves.push({san:move.san, to:move.to, rating:{id:"...", class:"c-book", text:"Thinking...", acc:0}, eval:(cIdx>0?aMoves[cIdx-1].eval:0)});
        $("#exitVarBtn").show(); updateNavH(); buildRib(); jump(cIdx);
        // Short-circuit: no engine needed if game is over
        if(game.in_checkmate()) {
            aMoves[cIdx].rating = {id:"#", class:"c-best", text:"is a Checkmate! 🏆", acc:100};
            eMode = "idle"; buildRib(); jump(cIdx); return;
        }
        if(game.game_over()) {
            aMoves[cIdx].rating = {id:"½", class:"c-good", text:"ends the game (Draw)", acc:80};
            eMode = "idle"; buildRib(); jump(cIdx); return;
        }
        postFen = game.fen(); // capture POST-move position
        eMode = "live"; livePhase = 1;
        // Phase 1: analyze PRE-move position to get correct "better was" suggestion
        engine.postMessage("position fen " + preFen);
        engine.postMessage("go movetime " + moveTime);
    }
    function liveRes(s, bm){
        // Normalize Phase 2 (post-move) score to white's perspective
        var postColor = postFen.includes(" w ") ? "w" : "b";
        var ws = (postColor == "w") ? s : -s;
        // Use Phase 1's freshly computed pre-move eval as the baseline (not stale stored value)
        // This ensures "better was X" and the classification use the same engine session
        var mover = preFen.includes(" w ") ? "w" : "b";
        var temp = new Chess(preFen); var mt = temp.move({from:bm.slice(0,2), to:bm.slice(2,4), promotion:"q"});
        // If the user played exactly the best move, mark it as Best immediately
        var playedSan = aMoves[cIdx].san;
        var bestSan = mt ? mt.san : null;
        aMoves[cIdx].eval = ws;
        aMoves[cIdx].rating = classify(playedSan, livePreEval, ws, mover, bestSan);
        eMode = "idle"; jump(cIdx);
    }
    function generateExplanation(x) {
        var d = aMoves[x];
        var badClasses = ["c-inaccuracy","c-mistake","c-blunder"];
        if(!d || !badClasses.includes(d.rating.class)) { $("#expl-sheet").removeClass("open"); return; }

        var cacheKey = x + "_" + d.san;
        if(explCache[cacheKey]) {
            showSheet(d, explCache[cacheKey]); return;
        }

        // Rebuild board state BEFORE this move
        var tmp = new Chess();
        for(var i = 0; i < x; i++) tmp.move(aMoves[i].san);
        var preFenForEx = tmp.fen();
        var moverColor = preFenForEx.includes(" w ") ? "w" : "b";
        var oppColor   = moverColor === "w" ? "b" : "w";
        var moverWord  = moverColor === "w" ? "White" : "Black";
        var moveNum    = Math.floor(x / 2) + 1;
        var ratingWord = d.rating.class.replace("c-", "");
        var evalLoss   = d.rating.evalLoss ? d.rating.evalLoss : 0;
        var bestWord   = d.rating.bestMove ? friendlyMove(d.rating.bestMove) : null;
        var playedSan  = friendlyMove(d.san);

        // Parse the move that was actually played
        var moveObj = null;
        try {
            var tmpCheck = new Chess(preFenForEx);
            // find the verbose move matching d.san
            var allMoves = tmpCheck.moves({verbose:true});
            moveObj = allMoves.find(m => m.san === d.san) || null;
        } catch(e) {}

        // --- Tactical pattern detection ---
        var reasons = [];

        // 1. Hung a piece? Apply move, then check if the moved piece is en prise
        if(moveObj) {
            var afterMove = new Chess(preFenForEx);
            afterMove.move(d.san);
            var dest = moveObj.to;
            var piece = afterMove.get(dest);
            if(piece) {
                // Check if destination is attacked by opponent
                var oppAttacks = afterMove.moves({verbose:true}).filter(m => m.to === dest);
                var defenders  = [];
                // Flip turn to check defender count (hack: use a FEN flip)
                var defFen = afterMove.fen().replace(/ (w|b) /, function(m,c){ return " "+(c==="w"?"b":"w")+" "; });
                try {
                    var defBoard = new Chess(defFen);
                    defenders = defBoard.moves({verbose:true}).filter(m => m.to === dest);
                } catch(e){}

                var pieceNames = {p:"pawn", n:"knight", b:"bishop", r:"rook", q:"queen", k:"king"};
                var pName = pieceNames[piece.type] || piece.type;

                if(oppAttacks.length > 0 && defenders.length === 0) {
                    reasons.push("The " + pName + " on " + dest + " is left completely undefended and can be captured for free.");
                } else if(oppAttacks.length > defenders.length && evalLoss > 1.0) {
                    reasons.push("The " + pName + " on " + dest + " is insufficiently defended and is likely to be lost.");
                }
            }

            // 2. Did the move give away a free capture? (piece moved away leaving something hanging)
            var preBoard = new Chess(preFenForEx);
            var preAttacked = preBoard.moves({verbose:true}).filter(m => m.color === oppColor && m.captured);
            var afterBoard2 = new Chess(preFenForEx);
            afterBoard2.move(d.san);
            var postAttacked = afterBoard2.moves({verbose:true}).filter(m => m.color === oppColor && m.captured);
            var newHanging = postAttacked.filter(pa => !preAttacked.some(pr => pr.to === pa.to && pr.captured === pa.captured));
            if(newHanging.length > 0 && reasons.length === 0) {
                var pieceNames2 = {p:"pawn", n:"knight", b:"bishop", r:"rook", q:"queen", k:"king"};
                var hung = newHanging[0];
                reasons.push("The move allows the opponent to capture the " + (pieceNames2[hung.captured]||hung.captured) + " on " + hung.to + " for free.");
            }

            // 3. Check if the move missed a check/capture of opponent king threat
            if(reasons.length === 0 && moveObj.captured) {
                // Recapture possible?
                var afterCapture = new Chess(preFenForEx);
                afterCapture.move(d.san);
                var recaps = afterCapture.moves({verbose:true}).filter(m => m.to === moveObj.to);
                if(recaps.length > 0) {
                    reasons.push("After this capture, the opponent can immediately recapture and regain material.");
                }
            }
        }

        // 4. King safety: did the move expose the king?
        if(reasons.length === 0 && evalLoss > 1.5) {
            var afterKing = new Chess(preFenForEx);
            afterKing.move(d.san);
            if(afterKing.in_check()) {
                // Opponent is in check — shouldn't be bad, skip
            } else {
                // Check if mover's king is now in a weak spot (in_check after opponent reply)
                var oppMoves2 = afterKing.moves({verbose:true});
                var checksOpponent = oppMoves2.filter(m => {
                    var t2 = new Chess(afterKing.fen()); t2.move(m);
                    return t2.in_check();
                });
                if(checksOpponent.length > 0) {
                    reasons.push("The move allows the opponent to deliver check, disrupting coordination and forcing a defensive response.");
                }
            }
        }

        // 5. Center/development fallback explanations based on move type and eval loss
        if(reasons.length === 0) {
            var moveNum2 = moveNum;
            if(moveNum2 <= 10) {
                if(d.san.startsWith("N") || d.san.startsWith("B")) {
                    reasons.push("In the opening, this piece move wastes tempo and allows the opponent to seize central control with faster development.");
                } else if(d.san.includes("x") === false && evalLoss > 0.8) {
                    reasons.push("This move loses central control and gives the opponent a positional advantage that is difficult to recover from.");
                }
            }
            if(reasons.length === 0) {
                if(evalLoss > 3) {
                    reasons.push("This move overlooks a strong opponent response that wins significant material or a decisive positional advantage.");
                } else if(evalLoss > 1.2) {
                    reasons.push("This move misses the position's key idea, allowing the opponent to take the initiative with a strong reply.");
                } else {
                    reasons.push("This move is slightly passive, giving the opponent an easier game without good compensation.");
                }
            }
        }

        // Build final explanation
        var txt = reasons[0];
        if(bestWord) txt += " The engine recommends <b>" + bestWord + "</b> instead.";

        explCache[cacheKey] = txt;
        showSheet(d, txt);
    }
    function updateNavH() {
        var h = document.getElementById("nav-bar").offsetHeight;
        document.documentElement.style.setProperty("--nav-h", h + "px");
    }
    function showSheet(d, txt) {
        var labelMap = {"c-inaccuracy":"?! Inaccuracy","c-mistake":"? Mistake","c-blunder":"?? Blunder"};
        $("#sheet-badge").attr("class","sheet-badge "+d.rating.class).text(labelMap[d.rating.class]||"");
        $("#sheet-title").html("<b>"+friendlyMove(d.san)+"</b> "+d.rating.text.replace(". Better was","<br><span style='font-size:13px;color:#aaa;font-weight:400'>Better was</span>"));
        $("#sheet-body").html(txt);
        updateNavH();
        $("#expl-sheet").addClass("open");
    }
    // Alias so the rest of the code that calls fetchExplanation still works
    var fetchExplanation = generateExplanation;
    function exitVar() { clr(); sSq=null; aMoves=JSON.parse(JSON.stringify(mLine)); eMode="batch"; $("#exitVarBtn").hide(); updateNavH(); buildRib(); jump(branchIdx>-1?branchIdx:0); }
    function buildRib(){ var r=$("#rib").empty(); aMoves.forEach((m,i)=>{ r.append($("<div>").addClass("m-item").attr("id","r"+i).text(((i%2==0?Math.floor(i/2)+1+".":""))+" "+friendlyMove(m.san)).click(()=>jump(i))); }); }
    function clr(){ $("#board [data-square]").removeClass("selected-square legal-dot legal-cap"); }
    function nav(d){ var n=cIdx+d; if(n>=0 && n<aMoves.length) jump(n); }
    function jump(x){
        $("#expl-sheet").removeClass("open");
        game.reset(); for(var i=0; i<=x; i++) game.move(aMoves[i].san);
        cIdx=x; board.position(game.fen()); var d=aMoves[x], e=d.eval, ed=(e>0?"+":"")+e.toFixed(1);
        if(Math.abs(e)>=9.9) ed=e>0?"+M":"-M";
        $("#coach-text").html("<span style='padding:2px 8px; border-radius:4px; color:#fff;' class='"+d.rating.class+"'>"+d.rating.id+"</span> "+"<b>"+friendlyMove(d.san)+"</b> "+d.rating.text);
        fetchExplanation(x);
        $("#en").text(ed).css({color:e>=0?"#000":"#fff", bottom:e>=0?"auto":"4px", top:e>=0?"4px":"auto"});
        $("#ef").css("height", Math.max(0, Math.min(100, 50+(e*10)))+"%");
        var files = 'abcdefgh'; var col = files.indexOf(d.to[0]); var row = 8 - parseInt(d.to[1]);
        if(userColor === "black") { col = 7 - col; row = 7 - row; }
        $("#badge-layer").html('<div class="move-badge '+d.rating.class+'" style="top:'+(row*12.5)+'%; left:'+(col*12.5 + 6.25)+'%;">'+d.rating.id+'</div>');
        var wa=0, wm=0, ba=0, bm=0;
        for (var k=0; k<=x; k++){ var t=(k%2==0)?"w":"b"; if(aMoves[k].rating.acc>0){ if(t=="w"){wa+=aMoves[k].rating.acc;wm++;}else{ba+=aMoves[k].rating.acc;bm++;} } }
        $("#wa-text").text(wm>0?(wa/wm).toFixed(0):"100"); $("#ba-text").text(bm>0?(ba/bm).toFixed(0):"100");
        $(".m-item").removeClass("active"); if($("#r"+x).length) { $("#r"+x).addClass("active")[0].scrollIntoView({behavior:"smooth", block:"nearest", inline:"center"}); }
    }
}); // end $(document).ready
</script>
