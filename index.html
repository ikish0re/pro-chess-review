<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Game Review</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <style>
        :root { --bg: #21201d; --panel: #262421; --accent: #81b64c; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; width: 100%; }
        .app-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; }

        /* ── Setup ── */
        #setup-screen { background: var(--panel); padding: 20px; border-radius: 12px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tab-container { display: flex; width: 100%; margin-bottom: 15px; background: #111; border-radius: 8px; overflow: hidden; padding: 3px; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; color: #888; background: transparent; border: none; transition: 0.2s; }
        .tab.active { background: #333; color: #fff; border-bottom: 2px solid var(--accent); }
        .tab-content { display: none; flex-direction: column; }
        .tab-content.active { display: flex; }
        .search-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        input[type=text] { flex: 1; background: #333; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 16px; outline: none; }
        .btn-search { background: #555; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-weight: bold; cursor: pointer; height: 46px; white-space: nowrap; }
        .filter-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .filter-row select { flex: 1; background: #333; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 8px; font-size: 12px; appearance: none; text-align: center; }
        .game-list { max-height: 280px; overflow-y: auto; background: #1a1917; border-radius: 8px; border: 1px solid #333; margin-top: 5px; }
        .game-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; gap: 12px; position: relative; transition: background 0.1s; }
        .game-card:active { background: #2a2825; }
        .game-card.selected { background: rgba(129,182,76,0.15); border-left: 4px solid var(--accent); }
        .gc-avatar { width: 44px; height: 44px; background: #333; border-radius: 8px; overflow: hidden; flex-shrink: 0; border: 1px solid #555; position: relative; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #555; }
        .gc-avatar img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; display: none; }
        .gc-details { flex: 1; min-width: 0; }
        .gc-opp { font-size: 14px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gc-meta { font-size: 11px; color: #666; margin-top: 3px; }
        .gc-res { font-weight: bold; font-size: 11px; padding: 4px 10px; border-radius: 6px; min-width: 55px; text-align: center; flex-shrink: 0; }
        .win  { background: rgba(129,182,76,0.2);  color: #81b64c; border: 1px solid #81b64c; }
        .draw { background: rgba(240,193,92,0.2);  color: #f0c15c; border: 1px solid #f0c15c; }
        .loss { background: rgba(179,52,48,0.2);   color: #e05550; border: 1px solid #b33430; }

        #statsBar { display: none; background: #1e2d14; border: 1px solid #3a5c28; border-radius: 8px; padding: 10px 14px; margin-top: 8px; flex-direction: row; justify-content: space-between; align-items: center; gap: 8px; }

        textarea#pgnInput { background: #333; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 13px; outline: none; min-height: 130px; resize: vertical; width: 100%; margin-top: 5px; font-family: monospace; }

        .depth-select { width: 100%; padding: 14px; margin-top: 15px; background: #333; color: #fff; border: 1px solid #444; border-radius: 10px; font-size: 14px; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 18px; cursor: pointer; }
        .run-btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 17px; margin-top: 15px; box-shadow: 0 4px 0 #5d8b33; transition: opacity 0.2s; }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #statusMsg { color: #ffaa00; font-size: 13px; margin: 10px 0 0; text-align: center; font-weight: bold; min-height: 18px; }
        #prog-wrap { display: none; height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        #prog-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.2s ease; border-radius: 4px; }

        #backend-banner { background: #2a1a0a; border: 1px solid #7c4a10; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #f0a050; margin-bottom: 8px; display: none; text-align: center; }

        /* ── Review ── */
        #review-screen { display: none; width: 100%; flex-direction: column; gap: 10px; }
        .accuracy-header { display: flex; width: 100%; background: #302e2b; border-radius: 10px; overflow: hidden; padding: 4px; gap: 4px; }
        .acc-pill { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; border-radius: 6px; }
        .acc-pill.white-p { background: #f1f1f1; color: #000; }
        .acc-pill.black-p { background: #444; color: #fff; }
        .acc-val { font-size: 22px; font-weight: 900; line-height: 1; }
        .acc-label { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 4px; opacity: 0.7; }

        .coach-wrap { display: flex; align-items: center; width: 100%; gap: 8px; }
        .coach-avatar { font-size: 44px; line-height: 1; flex-shrink: 0; }
        .bubble { flex: 1; background: #fff; color: #000; padding: 10px 14px; border-radius: 20px; border-bottom-left-radius: 2px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .board-box { display: flex; gap: 10px; width: 100%; }
        #board-wrapper { flex: 1; position: relative; border-radius: 6px; border: 3px solid #333; overflow: hidden; }
        #badge-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .eval-bar { width: 28px; background: #333; border-radius: 6px; overflow: hidden; position: relative; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid #444; }
        .efill { width: 100%; height: 50%; background: #fff; transition: height 0.3s ease; }
        .enum { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: bold; z-index: 10; }

        .ribbon { display: flex; overflow-x: auto; background: #302e2b; padding: 10px 12px; border-radius: 8px; gap: 8px; min-height: 46px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .m-item { color: #888; cursor: pointer; white-space: nowrap; padding: 5px 10px; border-radius: 4px; font-size: 13px; user-select: none; }
        .m-item:hover { color: #ccc; }
        .m-item.active { color: #fff; background: #444; border-bottom: 3px solid var(--accent); }

        .move-badge { position: absolute; width: 22px; height: 22px; border-radius: 50%; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.8); transform: translate(-50%,-50%); box-shadow: 0 2px 6px rgba(0,0,0,0.7); z-index: 200; font-size: 11px; }
        .c-brilliant  { background: #15d1ba; color: #000; }
        .c-great      { background: #5c8bb0; }
        .c-best       { background: #95bb4a; }
        .c-good       { background: #96af8b; }
        .c-inaccuracy { background: #f0c15c; color: #000; }
        .c-mistake    { background: #e6912c; }
        .c-blunder    { background: #b33430; }
        .c-pending    { background: #555; }
        [data-square] { position: relative; }
        .selected-square { background-color: rgba(129,182,76,0.5) !important; }
        .legal-dot::after { content: ""; position: absolute; top: 50%; left: 50%; width: 28%; height: 28%; background: rgba(0,0,0,0.18); border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; }
        .legal-cap::after { content: ""; position: absolute; top: 50%; left: 50%; width: 80%; height: 80%; border: 6px solid rgba(0,0,0,0.18); border-radius: 50%; transform: translate(-50%,-50%); box-sizing: border-box; pointer-events: none; }

        .btn-secondary { width: 100%; padding: 12px; background: #333; border: 1px solid #555; color: #bbb; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn-secondary:hover { background: #3a3a3a; }

        /* ── Explanation slide-up sheet ── */
        #expl-sheet { position: fixed; left: 0; right: 0; bottom: -500px; z-index: 998; background: #1c1c1e; border-radius: 20px 20px 0 0; padding: 0 16px 20px; box-shadow: 0 -6px 30px rgba(0,0,0,0.7); transition: bottom 0.3s cubic-bezier(0.4,0,0.2,1); max-height: 52vh; overflow-y: auto; }
        #expl-sheet.open { bottom: var(--nav-h, 90px); }
        .sheet-handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin: 12px auto 14px; }
        .sheet-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
        .sheet-badge.c-brilliant  { background: rgba(21,209,186,0.15);  color: #15d1ba; border: 1px solid rgba(21,209,186,0.35); }
        .sheet-badge.c-inaccuracy { background: rgba(240,193,92,0.15);  color: #f0c15c; border: 1px solid rgba(240,193,92,0.35); }
        .sheet-badge.c-mistake    { background: rgba(230,145,44,0.15);  color: #e6912c; border: 1px solid rgba(230,145,44,0.35); }
        .sheet-badge.c-blunder    { background: rgba(179,52,48,0.15);   color: #e05550; border: 1px solid rgba(179,52,48,0.35); }
        .sheet-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 8px; line-height: 1.35; }
        .sheet-body  { font-size: 14px; color: #999; line-height: 1.65; }
        .sheet-body b { color: #81b64c; }
        .sheet-dismiss { position: absolute; top: 12px; right: 14px; background: #2c2c2e; border: none; color: #888; font-size: 15px; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }

        /* ── Fixed nav bar ── */
        #nav-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1a1917; padding: 10px 14px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); flex-direction: column; gap: 6px; z-index: 999; border-top: 1px solid #2a2825; }
        .nav-btns { display: flex; gap: 10px; }
        .nav-btns .run-btn { margin-top: 0; font-size: 16px; padding: 13px; }
    </style>
</head>
<body>
<div class="app-container">

    <div id="backend-banner">⚠️ Cannot reach backend — check your API URL below</div>

    <div id="setup-screen">
        <h2 style="margin:0 0 15px;text-align:center;color:var(--accent);font-size:20px;">♟️ Pro Game Review</h2>

        <div class="tab-container">
            <button class="tab active" id="t-api" onclick="setTab('api')">Chess.com</button>
            <button class="tab" id="t-pgn" onclick="setTab('pgn')">Paste PGN</button>
        </div>

        <!-- Chess.com tab -->
        <div id="p-api" class="tab-content active">
            <div class="search-row">
                <input type="text" id="userInput" placeholder="Chess.com username">
                <button onclick="apiFetch()" class="btn-search">Search</button>
            </div>
            <div class="filter-row">
                <select id="fYear"></select>
                <select id="fMonth"></select>
                <select id="fDay"><option value="all">Any Day</option></select>
            </div>
            <div id="statsBar">
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#81b64c;" id="statWins">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Wins</div></div>
                <div style="width:1px;background:#3a5c28;align-self:stretch;"></div>
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#e05550;" id="statLosses">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Losses</div></div>
                <div style="width:1px;background:#3a5c28;align-self:stretch;"></div>
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#f0c15c;" id="statDraws">0</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Draws</div></div>
                <div style="width:1px;background:#3a5c28;align-self:stretch;"></div>
                <div style="text-align:center;"><div style="font-size:18px;font-weight:900;color:#fff;" id="statAcc">—</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;">Avg Acc</div></div>
            </div>
            <div class="game-list" id="glBox" style="display:none;"></div>
        </div>

        <!-- PGN tab -->
        <div id="p-pgn" class="tab-content">
            <textarea id="pgnInput" placeholder="Paste PGN here..."></textarea>
        </div>

        <div style="margin-top:15px;display:flex;flex-direction:column;gap:10px;">
            <!-- Maximum Time — matches Chess.com options -->
            <div style="display:flex;align-items:center;gap:10px;">
                <label style="color:#aaa;font-size:13px;white-space:nowrap;width:110px;">Maximum Time</label>
                <select id="moveTime" class="depth-select" style="margin-top:0;flex:1;">
                    <option value="3">3 sec</option>
                    <option value="5" selected>5 sec</option>
                    <option value="10">10 sec</option>
                    <option value="20">20 sec</option>
                    <option value="30">30 sec</option>
                    <option value="0">Unlimited</option>
                </select>
            </div>
            <!-- Number of Lines — matches Chess.com options -->
            <div style="display:flex;align-items:center;gap:10px;">
                <label style="color:#aaa;font-size:13px;white-space:nowrap;width:110px;">Number of Lines</label>
                <select id="numLines" class="depth-select" style="margin-top:0;flex:1;">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
        </div>

        <button id="runBtn" class="run-btn" onclick="startAnalysis()">Run Game Review</button>
        <div id="statusMsg"></div>
        <div id="prog-wrap"><div id="prog-fill"></div></div>
    </div>

    <!-- Review screen -->
    <div id="review-screen">
        <div class="accuracy-header">
            <div class="acc-pill white-p"><span class="acc-val" id="wa-text">—</span><span class="acc-label">White Acc</span></div>
            <div class="acc-pill black-p"><span class="acc-val" id="ba-text">—</span><span class="acc-label">Black Acc</span></div>
        </div>
        <div class="coach-wrap">
            <div class="coach-avatar">👨🏽‍🏫</div>
            <div class="bubble" id="coach-text">Ready.</div>
        </div>
        <div class="board-box">
            <div id="board-wrapper"><div id="board"></div><div id="badge-layer"></div></div>
            <div class="eval-bar"><div class="efill" id="ef"></div><div class="enum" id="en" style="bottom:4px;">0.0</div></div>
        </div>
        <div class="ribbon" id="rib"></div>
        <button class="btn-secondary" onclick="location.reload()">↺ Load New Game</button>
        <div style="height:110px;"></div>
    </div>

    <!-- Explanation sheet -->
    <div id="expl-sheet">
        <div class="sheet-handle"></div>
        <button class="sheet-dismiss" onclick="$('#expl-sheet').removeClass('open')">✕</button>
        <div id="sheet-badge" class="sheet-badge"></div>
        <div id="sheet-title" class="sheet-title"></div>
        <div id="sheet-body"  class="sheet-body"></div>
    </div>

    <!-- Fixed bottom nav -->
    <div id="nav-bar">
        <button id="exitVarBtn" onclick="exitVar()" style="display:none;width:100%;padding:11px;background:#b33430;border:none;color:#fff;font-weight:bold;border-radius:10px;cursor:pointer;">🔙 Exit Variation</button>
        <div class="nav-btns">
            <button class="run-btn" style="background:#3a3835;box-shadow:none;" onclick="nav(-1)">◀ Prev</button>
            <button class="run-btn" onclick="nav(1)">Next ▶</button>
        </div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  ⚙️  CONFIG — set this to your Replit backend URL
// ════════════════════════════════════════════════════════
window.API = "https://YOUR-REPL-NAME.YOUR-USERNAME.repl.co";

$(document).ready(function () {

    // ── Health check ───────────────────────────────────────
    fetch(window.API + "/health")
        .then(r => { if(!r.ok) throw new Error(); })
        .catch(() => $("#backend-banner").show());

    // ── Date filters ───────────────────────────────────────
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var now = new Date();
    for (var i = now.getFullYear(); i >= 2010; i--) $("#fYear").append(new Option(i,i));
    months.forEach((m,i) => $("#fMonth").append(new Option(m,(i+1).toString().padStart(2,"0"))));
    for (var i = 1; i <= 31; i++) $("#fDay").append(new Option(i,i));
    $("#fYear").val(now.getFullYear());
    $("#fMonth").val((now.getMonth()+1).toString().padStart(2,"0"));

    // ── State ───────────────────────────────────────────────
    var selPgn="", board=null, game=new Chess();
    var aMoves=[], mLine=[], cIdx=-1, branchIdx=-1;
    var userColor="white", sSq=null, isLive=false, isVariation=false;

    window.setTab = t => {
        $(".tab,.tab-content").removeClass("active");
        t==="api" ? $("#t-api,#p-api").addClass("active") : $("#t-pgn,#p-pgn").addClass("active");
    };
    window.nav    = d => { var n=cIdx+d; if(n>=0&&n<aMoves.length) jump(n); };
    window.exitVar = exitVar;

    // ════════════════════════════════════════════════════════
    //  Chess.com game list
    // ════════════════════════════════════════════════════════
    window.apiFetch = async function() {
        var u = $("#userInput").val().trim(); if(!u) return;
        var y = $("#fYear").val(), m = $("#fMonth").val(), df = $("#fDay").val();
        setStatus("Searching Chess.com…");
        var url = `https://api.chess.com/pub/player/${u}/games/${y}/${m}`;
        var data;
        try {
            var r = await fetch(url); if(!r.ok) throw new Error();
            data = await r.json();
        } catch {
            try { data = await (await fetch("https://corsproxy.io/?"+encodeURIComponent(url))).json(); }
            catch { setStatus("❌ Network error — check username."); return; }
        }
        var games = (data.games||[]).reverse();
        if(df!=="all") games = games.filter(g => new Date(g.end_time*1000).getDate()==parseInt(df));
        if(!games.length) { $("#statsBar").hide(); setStatus("No games found."); return; }

        // Stats bar
        var w=0,l=0,d=0,tAcc=0,aC=0;
        games.forEach(g => {
            var isW = g.white.username.toLowerCase()===u.toLowerCase();
            var res = isW?g.white.result:g.black.result;
            if(res==="win") w++; else if(["checkmated","resigned","timeout","abandoned","lose"].includes(res)) l++; else d++;
            var acc = isW?(g.accuracies?.white):(g.accuracies?.black);
            if(acc>0){tAcc+=acc;aC++;}
        });
        $("#statWins").text(w); $("#statLosses").text(l); $("#statDraws").text(d);
        $("#statAcc").text(aC>0?(tAcc/aC).toFixed(1)+"%":"—");
        $("#statsBar").css("display","flex");

        // Game cards
        var list = $("#glBox").empty().show();
        games.forEach((g,i) => {
            var isW = g.white.username.toLowerCase()===u.toLowerCase(), opp=isW?g.black:g.white;
            var res = isW?g.white.result:g.black.result;
            var rc  = res==="win"?"win":["checkmated","resigned","timeout","abandoned","lose"].includes(res)?"loss":"draw";
            var acc = isW?(g.accuracies?.white):(g.accuracies?.black);
            var card = $("<div>").addClass("game-card").click(function(){
                $(".game-card").removeClass("selected"); $(this).addClass("selected");
                selPgn=g.pgn; setStatus("✅ Selected — tap Run Game Review");
            });
            var av = $("<div>").addClass("gc-avatar").text("♟").attr("id","av-"+i);
            av.append($("<img>").attr({src:"",id:"avimg-"+i}));
            var det = $("<div>").addClass("gc-details")
                .append($("<div>").addClass("gc-opp").text(opp.username+(g.white.username.toLowerCase()===u.toLowerCase()?" (W)":" (B)")))
                .append($("<div>").addClass("gc-meta").text(g.time_class+(acc>0?" · "+acc.toFixed(1)+"%":"")+" · "+new Date(g.end_time*1000).toLocaleDateString()));
            card.append(av, det, $("<div>").addClass("gc-res "+rc).text(rc.toUpperCase()));
            list.append(card);
            // Avatar with CORS proxy fallback
            fetch("https://api.chess.com/pub/player/"+opp.username)
                .then(r=>r.json()).catch(()=>
                    fetch("https://corsproxy.io/?"+encodeURIComponent("https://api.chess.com/pub/player/"+opp.username)).then(r=>r.json())
                )
                .then(p=>{ if(p?.avatar){ var img=$("#avimg-"+i); img.attr("src",p.avatar).show(); $("#av-"+i).text(""); } })
                .catch(()=>{});
        });
        setStatus(`Found ${games.length} game(s) — tap one to select`);
    };

    // ════════════════════════════════════════════════════════
    //  Start analysis — send PGN to Python backend
    // ════════════════════════════════════════════════════════
    window.startAnalysis = async function() {
        var pgn = $("#p-api").hasClass("active") ? selPgn : $("#pgnInput").val().trim();
        if(!pgn) return alert("Select a game or paste a PGN first.");
        var move_time = parseFloat($("#moveTime").val());
        var num_lines = parseInt($("#numLines").val());

        // Detect user color
        var wm=pgn.match(/\[White "([^"]+)"\]/i), bm=pgn.match(/\[Black "([^"]+)"\]/i);
        var cu=$("#userInput").val().trim().toLowerCase();
        userColor = (bm&&bm[1].toLowerCase()===cu) ? "black" : "white";

        $("#runBtn").prop("disabled",true);
        $("#prog-wrap").show(); $("#prog-fill").css("width","0%");
        aMoves=[];

        try {
            setStatus("Sending to server…");
            var resp = await fetch(`${window.API}/analyze/stream`, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({pgn, move_time, num_lines})
            });
            if(!resp.ok) throw new Error("Server error "+resp.status);

            var reader=resp.body.getReader(), dec=new TextDecoder(), buf="";

            while(true) {
                var {value, done} = await reader.read();
                if(done) break;
                buf += dec.decode(value, {stream:true});
                var lines=buf.split("\n"); buf=lines.pop();
                for(var line of lines) {
                    if(!line.trim()) continue;
                    var d=JSON.parse(line);
                    if(d.error){ setStatus("❌ "+d.error); return; }
                    aMoves.push({san:d.san, to:d.uci.slice(2,4), rating:d.classification, eval:d.eval});
                    var pct=Math.round((d.index+1)/d.total*100);
                    $("#prog-fill").css("width",pct+"%");
                    setStatus(`Analyzing move ${d.index+1} / ${d.total} &nbsp;<b style="color:#81b64c">${pct}%</b>`);
                }
            }
        } catch(e) {
            setStatus("❌ Connection failed: "+e.message);
            $("#backend-banner").show();
            $("#runBtn").prop("disabled",false);
            return;
        }

        mLine=JSON.parse(JSON.stringify(aMoves));
        finalize();
    };

    // ════════════════════════════════════════════════════════
    //  Show review board
    // ════════════════════════════════════════════════════════
    function finalize() {
        $("#setup-screen").hide();
        $("#review-screen").css("display","flex");
        $("#nav-bar").css("display","flex");

        board = ChessBoard("board",{
            position:"start", orientation:userColor,
            pieceTheme: p=>`https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/wikipedia/${p}.png`,
            moveSpeed:"fast"
        });

        $("#board").on("click","[data-square]",function(e){
            if(isLive) return;
            var sq=$(e.target).closest("[data-square]").attr("data-square"), p=game.get(sq);
            if(p&&p.color===game.turn()){
                sSq=sq; clr();
                $(".square-"+sq).addClass("selected-square");
                game.moves({square:sq,verbose:true}).forEach(m=>$(".square-"+m.to).addClass(m.captured?"legal-cap":"legal-dot"));
            } else if(sSq){
                var v=game.moves({square:sSq,verbose:true}).find(m=>m.to===sq);
                if(v) playManual(sSq,sq);
                sSq=null; clr();
            }
        });

        buildRib(); jump(0);
    }

    // ════════════════════════════════════════════════════════
    //  Manual move — send to Python backend for eval
    // ════════════════════════════════════════════════════════
    async function playManual(from, to) {
        var preFen=game.fen();
        var move=game.move({from,to,promotion:"q"}); if(!move) return;
        if(!isVariation) branchIdx=cIdx;
        isVariation=true; isLive=true;
        cIdx++; aMoves=aMoves.slice(0,cIdx);
        aMoves.push({san:move.san,to:move.to,rating:{id:"…",class:"c-pending",text:"Analyzing…",acc:0},eval:0});
        $("#exitVarBtn").show(); updateNavH(); buildRib(); jump(cIdx);

        var move_time=parseFloat($("#moveTime").val()||"5");
        var num_lines=parseInt($("#numLines").val()||"3");
        try {
            var resp=await fetch(`${window.API}/analyze/move`,{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({fen:preFen, move_uci:move.from+move.to, move_time, num_lines})
            });
            var d=await resp.json();
            aMoves[cIdx].rating=d.classification;
            aMoves[cIdx].eval=d.eval;
        } catch {
            aMoves[cIdx].rating={id:"?",class:"c-mistake",text:"(server unreachable)",acc:0};
        }
        isLive=false; buildRib(); jump(cIdx);
    }

    function exitVar() {
        clr(); sSq=null; isVariation=false; isLive=false;
        aMoves=JSON.parse(JSON.stringify(mLine));
        game.reset(); mLine.forEach(m=>game.move(m.san));
        $("#exitVarBtn").hide(); updateNavH();
        buildRib(); jump(branchIdx>-1?branchIdx:0);
    }

    // ════════════════════════════════════════════════════════
    //  Board UI helpers
    // ════════════════════════════════════════════════════════
    function buildRib() {
        var r=$("#rib").empty();
        aMoves.forEach((m,i)=>r.append(
            $("<div>").addClass("m-item").attr("id","r"+i)
                .text(((i%2===0)?Math.floor(i/2)+1+".":"")+" "+fm(m.san))
                .click(()=>jump(i))
        ));
    }

    function jump(x) {
        $("#expl-sheet").removeClass("open");
        game.reset(); for(var i=0;i<=x;i++) game.move(aMoves[i].san);
        cIdx=x; board.position(game.fen());
        var d=aMoves[x], e=d.eval||0;
        var ed=Math.abs(e)>=9.9?(e>0?"+M":"-M"):(e>0?"+":"")+e.toFixed(1);

        $("#coach-text").html(
            `<span style='padding:2px 7px;border-radius:4px;color:#fff;' class='${d.rating.class}'>${d.rating.id}</span> `+
            `<b>${fm(d.san)}</b> ${d.rating.text}`
        );
        $("#en").text(ed).css({color:e>=0?"#000":"#fff",bottom:e>=0?"auto":"4px",top:e>=0?"4px":"auto"});
        $("#ef").css("height",Math.max(0,Math.min(100,50+e*10))+"%");

        // Badge
        var files="abcdefgh", col=files.indexOf(d.to[0]), row=8-parseInt(d.to[1]);
        if(userColor==="black"){col=7-col;row=7-row;}
        $("#badge-layer").html(`<div class="move-badge ${d.rating.class}" style="top:${row*12.5}%;left:${col*12.5+6.25}%;">${d.rating.id}</div>`);

        // Accuracy pills
        var wa=0,wm=0,ba=0,bm=0;
        for(var k=0;k<=x;k++){
            var t=k%2===0?"w":"b";
            if(aMoves[k].rating.acc>0){ if(t==="w"){wa+=aMoves[k].rating.acc;wm++;}else{ba+=aMoves[k].rating.acc;bm++;} }
        }
        $("#wa-text").text(wm>0?(wa/wm).toFixed(0):"—");
        $("#ba-text").text(bm>0?(ba/bm).toFixed(0):"—");

        // Ribbon scroll
        $(".m-item").removeClass("active");
        if($("#r"+x).length) $("#r"+x).addClass("active")[0].scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});

        // Explanation sheet for bad/brilliant moves
        var sheetOn=["c-brilliant","c-inaccuracy","c-mistake","c-blunder"];
        if(sheetOn.includes(d.rating.class)) showSheet(d);
    }

    function showSheet(d) {
        var labels={"c-brilliant":"!! Brilliant","c-inaccuracy":"?! Inaccuracy","c-mistake":"? Mistake","c-blunder":"?? Blunder"};
        $("#sheet-badge").attr("class","sheet-badge "+d.rating.class).text(labels[d.rating.class]||"");
        var parts=d.rating.text.split(". Better was");
        var title=`<b>${fm(d.san)}</b> ${parts[0]}`;
        if(parts[1]) title+=`<br><span style="font-size:13px;color:#777;font-weight:400">Better was${parts[1]}</span>`;
        $("#sheet-title").html(title);
        $("#sheet-body").html(buildExpl(d));
        updateNavH();
        $("#expl-sheet").addClass("open");
    }

    function buildExpl(d) {
        var loss=d.rating.eval_loss||0;
        var best=d.rating.bestMove?`The engine recommends <b>${fm(d.rating.bestMove)}</b> instead.`:"";
        if(d.rating.class==="c-brilliant") return "A piece sacrifice that is very hard to find over the board. The engine confirms it leads to the strongest position despite leaving material en prise.";
        if(loss>=2) return "This move allows a strong opponent reply that wins material or a decisive positional advantage. "+best;
        if(loss>=1.2) return "This move misses the key idea in the position, handing the opponent the initiative. "+best;
        return "A slightly passive move that gives the opponent an easier game without sufficient compensation. "+best;
    }

    function updateNavH() {
        requestAnimationFrame(()=>{
            var h=document.getElementById("nav-bar").offsetHeight;
            document.documentElement.style.setProperty("--nav-h",(h+4)+"px");
        });
    }

    function clr(){ $("#board [data-square]").removeClass("selected-square legal-dot legal-cap"); }
    function setStatus(msg){ $("#statusMsg").html(msg); }
    function fm(san){
        if(!san) return san;
        if(san==="O-O-O"||san==="0-0-0") return "Long Castle";
        if(san==="O-O"||san==="0-0")     return "Short Castle";
        return san;
    }
});
</script>
